<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TiroX - Combat Mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <header class="glitch-header">
      <h1>TIRO<span>X</span></h1>
      <p class="subtitle">ZONA DE COMBATE</p>
    </header>

    <div class="top-controls">
      <button class="btn-primary" onclick="startWorkout()">INICIAR COMBATE</button>
      <button class="btn-secondary" onclick="addBlock()">+ ADICIONAR ALVO</button>
    </div>

    <div id="blocks-container"></div>

    <div class="hud-panel">
      <div class="hud-label">TEMPO RESTANTE</div>
      <div id="timer">00:00</div>
      <div id="status">STANDBY</div>
      <div id="pace">PACE ALVO ~5:00/km</div>
    </div>

    <div class="metronome-panel">
      <div class="bpm-control">
        <label for="bpm">BPM (CADÊNCIA):</label>
        <input type="number" id="bpm" value="180">
      </div>
      <button class="btn-metronome" id="metro-btn" onclick="toggleMetronome()">ATIVAR METRÔNOMO</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
