<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Runner Evolution Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="topo">
    <h1>Runner Evolution Dashboard</h1>
    <p>Acompanhe a evolução do corredor com métricas e gráficos</p>
  </header>

  <main class="container">
    <section class="cards">
  <div class="card">
    <h3>Distância total</h3>
    <p id="totalDistance"></p>
  </div>

  <div class="card">
    <h3>Pace médio</h3>
    <p id="avgPace"></p>
  </div>

  <div class="card">
    <h3>Total de treinos</h3>
    <p id="totalRuns"></p>
  </div>

  <div class="card">
    <h3>Maior distância</h3>
    <p id="longestRun"></p>
  </div>
</section>

    <section class="filtros">
      <button>7 dias</button>
      <button>30 dias</button>
      <button>90 dias</button>
      <button>1 ano</button>
    </section>

    <section class="graficos">
      <div class="grafico-box">
        <h2>Distância por treino</h2>
        <canvas id="distanceChart"></canvas>
      </div>

      <div class="grafico-box">
        <h2>Evolução do pace</h2>
        <canvas id="paceChart"></canvas>
      </div>
    </section>
  </main>

  <script src="runs.js"></script>
<script src="app.js"></script>
</body>
</html>
